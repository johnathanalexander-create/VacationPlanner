

<form (submit)="submitFCC()" [formGroup]="fccItemGroup">
	<h1 mat-dialog-title>FCC Item</h1>
	
	<mat-dialog-content>
		<div class="form-group">
			<div>
				<mat-form-field appearance="outline" class="form-field mt-2">
					<mat-label>Description</mat-label>
					<input matInput formControlName="fccTitle" type="text" autocomplete = "off">
				</mat-form-field>
				
				<mat-form-field appearance="outline" class="form-field mt-2">
					<mat-label>Amount</mat-label>
					<input matInput formControlName="fccAmount" type="text" autocomplete = "off">
				</mat-form-field>
			</div>
		</div>
	</mat-dialog-content>
	
	<mat-dialog-actions class="dialog-actions">
		<div class='left-actions'>
			<button *ngIf="(modalInputData.data.fcc.id) > 0" mat-button color="warn">Delete</button>
		</div>
		<div class='right-actions'>
			<button mat-button [mat-dialog-close] = "false">Close</button>
			<button type="submit" mat-flat-button color="primary" [disabled] = "fccItemGroup.invalid">Submit</button>
		</div>
		
		
	</mat-dialog-actions>
</form>
