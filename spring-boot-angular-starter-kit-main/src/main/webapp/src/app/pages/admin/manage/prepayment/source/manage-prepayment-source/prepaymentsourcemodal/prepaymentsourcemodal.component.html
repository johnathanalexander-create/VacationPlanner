

<form (submit) = "update()" [formGroup] = "prepaymentSourceGroup">
	<h1 mat-dialog-title>Update Prepayment Source: <span style="text-decoration: underline">{{modalInputData.data.prepaymentSource.name}}</span></h1>
	
	<mat-dialog-content>
		<div class="form-group">
			<div><!-- Used to adjust size of all fields here to full width -->
				<mat-form-field appearance="outline" class="form-field mt-2">
					<mat-label>Name</mat-label>
					<input matInput formControlName="name" type="text" autocomplete = "off">
				</mat-form-field>
				<mat-form-field appearance="outline" class="form-field mt-2">
					<mat-label>Cashback Rate</mat-label>
					<input matInput formControlName="cashbackRate" type="text" autocomplete = "off">
				</mat-form-field>
				
				<mat-form-field appearance="outline" class="form-field mt-2">
					<mat-label>Active</mat-label>
					<input matInput formControlName="active" type="text" autocomplete = "off">
				</mat-form-field>
				
			</div>
			
		</div>
	</mat-dialog-content>
	<mat-dialog-actions class="dialog-actions">
		<div class="left-actions">
			<button mat-button color="warn" (click)="delete()">Delete</button>
		</div>
		<div class="right-actions">
			<button mat-button [mat-dialog-close] = "false">Close</button>
			<button type="submit" mat-flat-button color="primary" [disabled] = "prepaymentSourceGroup.invalid">Save</button>
		</div>
		
	</mat-dialog-actions>
</form>
